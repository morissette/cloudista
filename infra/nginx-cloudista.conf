#
# cloudista.org — static site + API proxy
#

# Serve WebP to browsers that support it (Accept: image/webp).
# Referenced in the /images/ location below.
map $http_accept $webp_ext {
    default  "";
    "~*webp" ".webp";
}

# Note: Cloudflare real-IP config (set_real_ip_from, real_ip_header, real_ip_recursive)
# is set globally in /etc/nginx/nginx.conf — do not repeat here.

server {
    server_name  cloudista.org www.cloudista.org;

    # ── Security headers (applied to all responses) ──────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://challenges.cloudflare.com; connect-src 'self'; base-uri 'self'; form-action 'self'"
        always;

    # --- static site ---
    location / {
        root   /www/cloudista.org;
        index  index.html index.htm;
    }

    # --- Blog listing: redirect old /blog/ listing URLs to root ---
    location = /blog {
        return 301 /;
    }
    location = /blog/ {
        return 301 /;
    }

    # --- Blog pagination: /blog/3, /blog/12, etc. → pretty /page/N ---
    location ~ ^/blog/(\d+)/?$ {
        return 301 /page/$1;
    }

    # --- Pretty page pagination: /page/3, /page/12, etc. ---
    # Serve index.html; JS reads the page number from the path.
    location ~ ^/page/(\d+)/?$ {
        root   /www/cloudista.org;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # --- Pretty category filter: /category/aws, /category/kubernetes, etc. ---
    location ~ ^/category/[a-z0-9-]+/?$ {
        root   /www/cloudista.org;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # --- Pretty category + page: /category/aws/page/3 ---
    location ~ ^/category/[a-z0-9-]+/page/(\d+)/?$ {
        root   /www/cloudista.org;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # --- Blog static assets (js, css, etc.) — must come before slug proxy ---
    location ~ ^/blog/[^/]+\.(js|css|png|jpg|ico|svg|webmanifest)$ {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    # --- Blog post slugs: proxy to FastAPI for server-rendered HTML (SEO) ---
    # Matches /blog/<slug> where slug is not a page number (handled above).
    # Falls back to static post.html if FastAPI is unavailable.
    location ~ ^/blog/(?!\d+/?$)([a-z0-9][a-z0-9._-]*)/?$ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # Clear CF-Connecting-IP — the app uses X-Real-IP (already corrected by realip module)
        proxy_set_header    CF-Connecting-IP  "";
        proxy_read_timeout    10s;
        proxy_connect_timeout  5s;
        proxy_intercept_errors on;
        error_page 502 503 504 = /blog/post.html;
    }

    # --- Blog: pretty URLs (/blog/some-slug → post.html served internally) ---
    # Static files (index.html, post.html, blog.js) served directly.
    # Any /blog/<slug> path that isn't a real file falls back to post.html;
    # the JS reads the slug from location.pathname.
    location /blog/ {
        root   /www/cloudista.org;
        try_files $uri $uri/ /blog/post.html;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # --- Post images: serve WebP to supporting browsers, fall back to original ---
    # Uses try_files to check if the .webp variant actually exists before serving it.
    # This prevents 404s for images that have no .webp variant yet.
    location ~* ^(/images/.+)\.(png|jpe?g)$ {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary          Accept;
        set $img_stem $1;
        try_files "${img_stem}${webp_ext}" $uri =404;
    }
    location /images/ {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # --- Cache headers for immutable assets ---
    location ~* \.(css|js|png|ico|svg|webmanifest|woff2?)$ {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    # --- Cache headers for HTML (short TTL so updates are seen quickly) ---
    location ~* \.html$ {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    # --- robots.txt: short cache so it can be updated quickly ---
    location = /robots.txt {
        root   /www/cloudista.org;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- feed.xml: RSS feed, proxied to FastAPI ---
    location = /feed.xml {
        proxy_pass          http://127.0.0.1:8000/api/feed.xml;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    CF-Connecting-IP  "";
        proxy_read_timeout    10s;
        proxy_connect_timeout  5s;
    }

    # --- sitemap.xml: proxy to FastAPI; medium cache TTL ---
    location = /sitemap.xml {
        proxy_pass          http://127.0.0.1:8000/api/sitemap.xml;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    CF-Connecting-IP  "";
        proxy_read_timeout    10s;
        proxy_connect_timeout  5s;
    }

    # --- Prometheus metrics — proxied to FastAPI /metrics endpoint ---
    location = /metrics {
        proxy_pass          http://127.0.0.1:8000/metrics;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    CF-Connecting-IP  "";
        proxy_read_timeout    5s;
        proxy_connect_timeout  3s;
    }

    # --- API proxy → cloudista-api Docker container ---
    # Container runs with --network host, so uvicorn binds to 0.0.0.0:8000
    # on the host. Proxied internally only — port 8000 is not open in the SG.
    location /api/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # Clear CF-Connecting-IP — prevents header injection by callers who bypass Cloudflare
        proxy_set_header    CF-Connecting-IP  "";
        proxy_read_timeout    10s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    10s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cloudista.org-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cloudista.org-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = cloudista.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.cloudista.org) {
        return 301 https://cloudista.org$request_uri;
    }

    listen       80;
    server_name  cloudista.org www.cloudista.org;
    return 404; # managed by Certbot
}
