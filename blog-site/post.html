<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title and meta are set dynamically by blog.js -->
  <title>Blog — Cloudista</title>
  <meta name="description" id="meta-description" content="">
  <link rel="canonical" id="canonical" href="https://cloudista.org/blog/">

  <!-- Open Graph (set dynamically) -->
  <meta property="og:type"        content="article">
  <meta property="og:url"         id="og-url"         content="">
  <meta property="og:title"       id="og-title"       content="">
  <meta property="og:description" id="og-description" content="">
  <meta property="og:image"       content="https://cloudista.org/og-image.png">

  <!-- Twitter Card (set dynamically) -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="twitter-title"       content="">
  <meta name="twitter:description" id="twitter-description" content="">
  <meta name="twitter:image"       content="https://cloudista.org/og-image.png">

  <!-- Favicons -->
  <link rel="icon"             href="/favicon.svg"          type="image/svg+xml">
  <link rel="icon"             href="/favicon.ico"          sizes="any">
  <link rel="icon"             href="/favicon-32x32.png"    type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest"         href="/site.webmanifest">

  <link rel="preload" as="style" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@500&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@500&display=optional" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- ══════════ HEADER ══════════ -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/" class="logo" aria-label="Cloudista — home">
        <div class="logo__mark" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
          </svg>
        </div>
        Cloudista
      </a>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="/blog/" class="active">Blog</a>
      </nav>
    </div>
  </header>

  <!-- ══════════ POST ══════════ -->
  <main class="post-page" id="main-content">
    <div class="container">

      <a href="/blog/" class="post-back" aria-label="Back to Blog">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Blog
      </a>

      <!-- loading / error states -->
      <div id="post-loading" aria-live="polite">
        <div class="post-header" style="max-width:720px">
          <div class="post-header__meta">
            <div class="skel" style="width:80px;height:12px"></div>
            <div class="skel" style="width:6px;height:6px;border-radius:50%"></div>
            <div class="skel" style="width:90px;height:12px"></div>
          </div>
          <div class="skel" style="width:75%;height:40px;margin-top:.75rem;border-radius:8px"></div>
          <div class="skel" style="width:55%;height:36px;margin-top:.6rem;border-radius:8px"></div>
        </div>
        <div style="max-width:720px;display:flex;flex-direction:column;gap:.75rem;margin-top:2rem">
          <div class="skel" style="width:100%;height:14px"></div>
          <div class="skel" style="width:93%;height:14px"></div>
          <div class="skel" style="width:97%;height:14px"></div>
          <div class="skel" style="width:80%;height:14px"></div>
        </div>
      </div>

      <div id="post-error" style="display:none; max-width:720px; padding: 4rem 0; text-align:center; color:var(--text-3);">
        <p style="font-size:1.1rem;font-weight:700;color:var(--text-1);margin-bottom:.5rem">Post not found</p>
        <p>This post may have moved or been removed.</p>
        <a href="/blog/" style="display:inline-block;margin-top:1.5rem;color:var(--accent);font-weight:600">← Back to Blog</a>
      </div>

      <div id="post-content" style="display:none">
        <header class="post-header" id="post-header">
          <div class="post-header__meta" id="post-meta"></div>
          <h1 class="post-header__title" id="post-title"></h1>
        </header>
        <div class="post-hero" id="post-hero" hidden>
          <img class="post-hero__img" id="post-hero-img" src="" alt="" fetchpriority="high" decoding="async">
          <p class="post-hero__credit" id="post-hero-credit" hidden></p>
        </div>
        <article class="post-body" id="post-body"></article>
        <aside class="related-posts" id="related-posts" hidden></aside>
      </div>

    </div>
  </main>

  <!-- ══════════ FOOTER ══════════ -->
  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">© 2026 Cloudista. All rights reserved.</p>
      <nav class="site-footer__links" aria-label="Footer links">
        <a href="mailto:admin@cloudista.org">Contact</a>
        <a href="/privacy.html" rel="noopener noreferrer">Privacy</a>
        <a href="/terms.html"   rel="noopener noreferrer">Terms</a>
      </nav>
    </div>
  </footer>

  <script src="/blog/blog.js" defer></script>
</body>
</html>
