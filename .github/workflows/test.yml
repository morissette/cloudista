---
name: Test

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pipenv
          cd api && pipenv install --system --skip-lock --dev

      - name: Run tests
        working-directory: api
        env:
          BLOG_DB_PASSWORD: test-password
          BLOG_DB_HOST: localhost
          TURNSTILE_SECRET: ""
        run: pytest tests/ -v --tb=short
