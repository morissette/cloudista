---
name: Lint

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ruff has no first-party reviewdog action; use CLI with rdjson output
      - name: Python — ruff
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install ruff
          ruff check --output-format=rdjson . \
            | reviewdog -f=rdjson -name=ruff \
                -reporter=${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }} \
                -fail-level=any

      - name: YAML — yamllint
        uses: reviewdog/action-yamllint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          yamllint_flags: ".github/workflows/"
          fail_level: any

      - name: Shell — shellcheck
        uses: reviewdog/action-shellcheck@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          fail_level: any

      # eslint.config.mjs imports @eslint/js — needs local node_modules
      - name: Install JS deps
        run: npm ci

      - name: JavaScript — eslint
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          eslint_flags: "site/main.js blog-site/blog.js"
          fail_level: any
