---
name: Lint

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python — ruff
        run: |
          pip install ruff
          ruff check .

      - name: YAML — yamllint
        run: |
          pip install yamllint
          yamllint .github/workflows/

      - name: Shell — shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

      - name: JavaScript — eslint
        run: |
          npm install -g eslint @eslint/js
          npx eslint site/main.js blog-site/blog.js
