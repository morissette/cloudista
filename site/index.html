<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudista — Cloud Infrastructure &amp; DevOps Blog</title>
  <meta name="description" content="Cloud infrastructure tutorials, DevOps guides, and platform engineering posts. AWS, Azure, GCP, and Kubernetes from the field.">

  <!-- Canonical -->
  <link rel="canonical" href="https://cloudista.org">

  <!-- Open Graph -->
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://cloudista.org">
  <meta property="og:title"        content="Cloudista — Cloud Infrastructure &amp; DevOps Blog">
  <meta property="og:description"  content="Cloud infrastructure, DevOps, and platform engineering from the field.">
  <meta property="og:image"        content="https://cloudista.org/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Cloudista — Cloud Infrastructure &amp; DevOps Blog">
  <meta name="twitter:description" content="Cloud infrastructure, DevOps, and platform engineering from the field.">
  <meta name="twitter:image"       content="https://cloudista.org/og-image.png">

  <!-- JSON-LD structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Cloudista",
    "url": "https://cloudista.org",
    "description": "Cloud infrastructure tutorials, DevOps guides, and platform engineering posts."
  }
  </script>

  <!-- Favicons -->
  <link rel="icon"             href="/favicon.svg"           type="image/svg+xml">
  <link rel="icon"             href="/favicon.ico"           sizes="any">
  <link rel="icon"             href="/favicon-32x32.png"     type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"  sizes="180x180">
  <link rel="manifest"         href="/site.webmanifest">
  <link rel="alternate" type="application/rss+xml" title="Cloudista RSS Feed" href="/feed.xml">
  <link rel="preload" as="style" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@500&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@500&display=optional" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- Confirmation banner — shown after clicking the email verification link -->
  <div class="confirm-banner" id="confirm-banner" role="alert" aria-live="polite"></div>

  <!-- ══════════ HEADER ══════════ -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/" class="logo" aria-label="Cloudista — home">
        <div class="logo__mark" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
          </svg>
        </div>
        Cloudista
      </a>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="/feed.xml" class="nav-rss" aria-label="RSS feed">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg>
          RSS
        </a>
        <button class="nav-subscribe" id="subscribe-btn" type="button">Subscribe</button>
      </nav>
    </div>
  </header>

  <!-- ══════════ BLOG LISTING ══════════ -->
  <main class="blog-page" id="main-content">
    <div class="container blog-page__inner">

      <div class="blog-header">
        <h1 class="blog-title">Blog</h1>
        <p class="blog-subtitle">Cloud infrastructure, DevOps, and platform engineering from the field.</p>
      </div>

      <!-- Search + filter -->
      <div class="blog-controls">
        <div class="blog-search">
          <svg class="blog-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" class="blog-search__input" type="search" placeholder="Search posts…" aria-label="Search posts" autocomplete="off">
        </div>
        <div class="blog-categories" id="category-pills" role="group" aria-label="Filter by category">
          <!-- category pills injected by JS -->
        </div>
      </div>

      <div class="post-grid" id="post-grid" aria-live="polite" aria-label="Blog posts">
        <!-- skeleton cards injected by JS until API responds -->
      </div>

      <div class="pagination" id="pagination" hidden>
        <button class="pagination__btn" id="prev-btn" aria-label="Previous page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Previous
        </button>
        <span class="pagination__info" id="page-info"></span>
        <button class="pagination__btn" id="next-btn" aria-label="Next page">
          Next
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

    </div>
  </main>

  <!-- ══════════ FOOTER ══════════ -->
  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">© 2026 Cloudista. All rights reserved.</p>
      <nav class="site-footer__links" aria-label="Footer links">
        <a href="mailto:admin@cloudista.org">Contact</a>
        <a href="/privacy.html" rel="noopener noreferrer">Privacy</a>
        <a href="/terms.html"   rel="noopener noreferrer">Terms</a>
      </nav>
    </div>
  </footer>

  <!-- Subscribe modal -->
  <div class="subscribe-modal" id="subscribe-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="subscribe-modal__backdrop" id="modal-backdrop"></div>
    <div class="subscribe-modal__dialog">
      <button class="subscribe-modal__close" id="modal-close" aria-label="Close dialog">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="subscribe-modal__title" id="modal-title">Stay in the loop</h2>
      <p class="subscribe-modal__desc">Get new posts delivered to your inbox. No spam, ever.</p>
      <form class="signup-form" id="subscribe-form" novalidate>
        <label for="subscribe-email" class="sr-only">Email address</label>
        <input type="email" id="subscribe-email" class="signup-form__input" placeholder="you@company.com" required autocomplete="email">
        <button type="submit" class="btn btn-primary" id="subscribe-submit">Subscribe</button>
        <div class="hp-field" aria-hidden="true">
          <label for="subscribe-website">Website</label>
          <input type="text" id="subscribe-website" name="website" tabindex="-1" autocomplete="off">
        </div>
      </form>
      <div id="subscribe-captcha-wrap" style="display:none;margin-top:.75rem;"></div>
      <div class="signup-success" id="subscribe-success" role="status" aria-live="polite">
        <span class="signup-success__icon" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span data-msg>Check your email — we've sent you a confirmation link.</span>
      </div>
      <p id="subscribe-error" style="display:none;margin-top:.5rem;font-size:.8rem;color:#dc2626;" role="alert"></p>
    </div>
  </div>

  <script src="/main.js" defer></script>
  <script src="/blog/blog.js" defer></script>

</body>
</html>
